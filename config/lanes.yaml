controller_issues:
  - issue_id: ctrl-20260512-python39-typing-compat
    title: Python 3.9 runtime rejected newer union type annotations
    severity: high
    state: fixed
    lane_id: controller-core
    task_id: controller-core-phase3
    symptom: Managed CLI crashed under the repo's Python 3.9 runtime when newer annotation syntax was used.
    root_cause: Controller code briefly used annotations that require newer Python semantics while pyproject declares Python >=3.9.
    improvement: Keep controller code Python 3.9 compatible or raise the declared runtime after explicit environment work.
    evidence: tests/test_event_dashboard_cli.py; .venv/bin/python -m pytest -q

  - issue_id: ctrl-20260512-ruff-regression
    title: Controller phase3 changes introduced import and line-length lint regressions
    severity: medium
    state: fixed
    lane_id: controller-core
    task_id: controller-core-phase3
    symptom: ruff check failed after adding dashboard/event commands.
    root_cause: New CLI output rows exceeded configured line length and imports were unsorted.
    improvement: Run ruff before declaring controller work complete and keep dashboard row definitions wrapped.
