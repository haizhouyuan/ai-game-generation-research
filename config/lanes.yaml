    status: available
    lane_id: qa-evidence
    summary: Zero-npm local Chrome CDP gate for G2/G4 browser prototype evidence packets, screenshots, hashes, state dumps, and console/network fail-close checks.
    evidence_paths:
      - tools/run_browser_prototype_gate.py
      - tools/verify_artifact_hashes.py
      - scenarios/p0_smoke_g2.json
      - scenarios/p1_rover_workshop_g4.json
      - experiments/game_p0_chatgpt_html_baseline_20260509/evidence/2026-05-12_g2/release_packet.json
      - experiments/game_p1_rover_workshop_demo/evidence/2026-05-13_rw_rover_001_texture_g4/release_packet.json
      - docs/capability_templates/browser_prototype_gate.md
    commands:
      - python3 tools/run_browser_prototype_gate.py --prototype-id p1_rover_workshop --entrypoint experiments/game_p1_rover_workshop_demo/index.html --scenario scenarios/p1_rover_workshop_g4.json --out experiments/game_p1_rover_workshop_demo/evidence/2026-05-13_rw_rover_001_texture_g4 --gate-level G4 --server-bind 127.0.0.1 --timeout-ms 30000
      - python3 tools/verify_artifact_hashes.py experiments/game_p1_rover_workshop_demo/evidence/2026-05-13_rw_rover_001_texture_g4/artifact_hashes.json
    inputs:
      - Static browser prototype entrypoint
      - browser_prototype_gate.v1 scenario JSON
    outputs:
      - release_packet.json
      - artifact_hashes.json
      - screenshots
      - state_dumps
      - closeout.md
    limitations:
      - Uses local Chrome CDP, not Playwright.
      - Console/network summaries are real CDP event summaries and now affect promotability, but they are still lighter than a full HAR/trace export.
    next_steps:
      - Extend console and request event collection when a richer browser transport is available.

