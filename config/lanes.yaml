    category: playable-prototype
    status: available
    lane_id: game-prototype
    summary: Child-friendly Three.js slice with rover movement, batteries, hazard, switch gate, finish pad, HUD, RW-ROVER-001 AI-assisted visual avatar with Blender rover-v1 material slots, procedural embedded base-color maps, UV proof, RW-CRATE-AI-001 visual landmark, and G4 evidence packet.
