repos:
  - repo_id: ai-game-generation-research
    path: /Users/yuanshaochen/Projects/ai-game-generation-research
    role: game-generation-research
    default_branch: main

lanes:
  - lane_id: controller-core
    title: Production managed-agents controller
    state: enabled
    auto_continue: false
    concurrency: 1
    owner: lead-orchestrator
    safety_policy: local-only-human-gated

  - lane_id: research-current-best-practices
    title: Current tooling and community best-practices research
    state: enabled
    auto_continue: false
    concurrency: 2
    owner: research-worker
    safety_policy: citations-no-large-downloads

  - lane_id: capability-registry
    title: Prior experiment capability registry and reusable skill templates
    state: enabled
    auto_continue: false
    concurrency: 1
    owner: capability-worker
    safety_policy: evidence-required-no-claims-without-local-proof

  - lane_id: unity-agent-mcp
    title: Unity Agent MCP and editor integration
    state: paused
    auto_continue: false
    concurrency: 1
    owner: unity-worker
    safety_policy: no-editor-download-until-no-proxy-verified

  - lane_id: threejs-playable-runtime
    title: Fast browser playable runtime and validators
    state: enabled
    auto_continue: false
    concurrency: 1
    owner: game-runtime-worker
    safety_policy: local-browser-validation

  - lane_id: asset-generation
    title: AI image and image-to-3D asset pipeline
    state: enabled
    auto_continue: false
    concurrency: 1
    owner: asset-worker
    safety_policy: homepc-gpu-no-large-unapproved-downloads

  - lane_id: blender-authoring
    title: Blender cleanup, material, screenshot, and GLB export
    state: enabled
    auto_continue: false
    concurrency: 1
    owner: blender-worker
    safety_policy: host-must-be-verified

  - lane_id: game-design
    title: P1 child-friendly game design and asset plan
    state: enabled
    auto_continue: false
    concurrency: 1
    owner: game-designer
    safety_policy: no-private-child-data

  - lane_id: game-prototype
    title: Playable game demo implementation
    state: enabled
    auto_continue: false
    concurrency: 1
    owner: prototype-worker
    safety_policy: design-gated-local-only

  - lane_id: qa-evidence
    title: Automated validation, review packets, and release evidence
    state: enabled
    auto_continue: false
    concurrency: 1
    owner: qa-worker
    safety_policy: evidence-required

  - lane_id: download-provenance
    title: No-proxy download, source, size, and hash governance
    state: enabled
    auto_continue: false
    concurrency: 1
    owner: provenance-worker
    safety_policy: no-system-proxy-changes

