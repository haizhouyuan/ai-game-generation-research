    limitations:
      - RW-ROVER-001 is generated from mesh-only TRELLIS output, then assigned heuristic Blender rover-v1 material slots plus procedural embedded base-color maps and planar UV proof; it has no source-baked photoreal PBR maps or rig.
      - Imported AI-assisted GLBs are visual-only and not used as gameplay collision.
      - Gameplay-critical movement/collision still use procedural state/proxies.
      - Does not claim Unity import.
      - Earlier P1 G4 packets are retained in experiment folders as historical pre-fail-close evidence; this capability points to the latest texture G4 packet as current promotable proof.
    next_steps:
      - Improve rover rig/animation and source-baked texture quality before treating it as production art.
      - Import the asset into Unity only after a Unity host is available.

