      - external/research_sources/README.md
      - docs/capability_templates/no_proxy_governed_download.md
    commands:
      - tools/download_no_proxy.sh
      - .venv/bin/codex-managed download-record SOURCE_URL --task TASK_ID --size-bytes BYTES --status planned
      - .venv/bin/codex-managed downloads --json-output
    inputs:
      - source URL
      - expected output path
    outputs:
      - retained source snapshot
      - hash and no-proxy evidence
      - registry download records with needs_approval state for unapproved >1GiB files
    limitations:
      - Any single file over 1GB still needs explicit approval for that exact source/version/size; this is a confirmation guard, not a download ban.
      - Homebrew package discovery may trigger index downloads and should be handled as a separate governed task.
    next_steps:
      - Use download-record for future governed downloads and metadata-only approval packets.

