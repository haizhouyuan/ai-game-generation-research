<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>GAME-E3 Procedural Playable Import Path</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(10, 14, 18, 0.82);
      --line: rgba(255, 255, 255, 0.16);
      --text: #f6f3ea;
      --muted: #b8c0bd;
      --active: #ffd45c;
    }
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #11161a;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .topbar {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      width: min(520px, calc(100vw - 28px));
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-sizing: border-box;
      backdrop-filter: blur(8px);
    }
    .benchmarks {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      min-width: 68px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }
    button.active {
      border-color: var(--active);
      color: #15110a;
      background: var(--active);
    }
    #reset {
      min-width: 42px;
      font-size: 18px;
    }
    .prompt {
      grid-column: 1 / -1;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    #status-json {
      position: fixed;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    @media (max-width: 680px) {
      .topbar {
        left: 10px;
        right: 10px;
        top: auto;
        bottom: 10px;
        width: auto;
      }
      button {
        min-width: 60px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" width="1280" height="720" aria-label="GAME-E3 procedural playable prototype"></canvas>
  <section class="topbar" aria-label="Benchmark selector">
    <div id="benchmark-buttons" class="benchmarks"></div>
    <button id="reset" type="button" title="Reset current benchmark">R</button>
    <p id="prompt-text" class="prompt"></p>
  </section>
  <pre id="status-json" aria-hidden="true"></pre>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
