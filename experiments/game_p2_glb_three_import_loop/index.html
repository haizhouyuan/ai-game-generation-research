<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GAME-P2 GLB Import Loop</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background: #111418;
        color: #e8eef2;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #hud {
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 2;
        display: grid;
        gap: 8px;
        min-width: 280px;
        max-width: min(420px, calc(100vw - 32px));
        padding: 12px 14px;
        background: rgba(16, 22, 29, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        backdrop-filter: blur(10px);
      }
      #hud strong {
        font-size: 14px;
      }
      #hud span, #hud select {
        font-size: 12px;
      }
      #hud select {
        width: 100%;
        color: #e8eef2;
        background: #1f2933;
        border: 1px solid #44515f;
        border-radius: 6px;
        padding: 6px;
      }
      #status {
        line-height: 1.45;
      }
      canvas {
        display: block;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud">
      <strong>GAME-P2 GLB Import Loop</strong>
      <select id="benchmark"></select>
      <span id="status">Loading assets...</span>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
