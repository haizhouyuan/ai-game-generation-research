  - capability_id: download-no-proxy-governance
    title: Command-local no-proxy download governance
    category: infrastructure
    status: available
    lane_id: download-provenance
    summary: Download policy and helper script allow useful downloads while protecting paid Clash traffic budget and requiring source/size/hash/no-proxy evidence.
    evidence_paths:
      - docs/direct_download_policy_2026-05-12.md
      - docs/download_registry_controller_update_2026-05-13.md
      - tools/download_no_proxy.sh
      - src/managed_codex/registry_ops.py
